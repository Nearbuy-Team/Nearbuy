services:
  - type: web
    name: nearbuy-user-7c197b38
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/render/Dockerfile.user-service
    dockerContext: ./backend
    envVars:
      - fromGroup: nearbuy-shared
      - key: SERVER_PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: nearbuy-db-7c197b38
          property: connectionString
      - key: SPRING_JPA_DDL_AUTO
        value: update
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
        value: 3
      - key: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
