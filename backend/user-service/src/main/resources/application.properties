spring.application.name=user-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/nearbuy_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:yourpassword}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
jwt.secret=${JWT_SECRET:nearbuy-super-secret-key-change-this-in-production-1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:nearbuy-api}
expo.push.enabled=${EXPO_PUSH_ENABLED:false}
nearbuy.otp.delivery=${OTP_DELIVERY:console}
nearbuy.otp.from=${OTP_FROM:no-reply@nearbuy.local}
nearbuy.otp.from-name=${OTP_FROM_NAME:Nearbuy}
nearbuy.otp.brevo-api-key=${BREVO_API_KEY:}
nearbuy.otp.brevo-api-url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
nearbuy.otp.mailjet-api-key=${MAILJET_API_KEY:}
nearbuy.otp.mailjet-secret-key=${MAILJET_SECRET_KEY:}
nearbuy.otp.mailjet-api-url=${MAILJET_API_URL:https://api.mailjet.com/v3.1/send}
nearbuy.internal-api-key=${INTERNAL_API_KEY:}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
