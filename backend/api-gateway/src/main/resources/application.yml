server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: listing-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/listings/**
        - id: chat-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/chats/**
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/orders/**,/api/wallet/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true